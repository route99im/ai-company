name: Poll Threads Replies

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Call poll-replies API
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://ai-company-flame.vercel.app/api/poll-replies
