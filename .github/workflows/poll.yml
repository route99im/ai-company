name: Poll Threads Replies

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Call poll-replies API
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://route99-ai-company.vercel.app/api/poll-replies || true

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
